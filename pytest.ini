[pytest]
# Sentinel's own suite only. The sample repos (samples/) and the read-only studio clone
# (neuro-san-studio/) have their own suites and are run separately.
testpaths = tests
norecursedirs = neuro-san-studio samples .venv graphify-out logs db/migrations
# tests are functions; don't collect the spec-named *Tool classes (TestMapperTool, TestRunnerTool)
python_classes = *Tests
