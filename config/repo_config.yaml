# Per-repo Sentinel config. Key under `repos:` = DeliveryEvent.repo.name. (04 §5 config files, §5.63)
# NOTE: python-payments-service smoke_set is real (repo built, 0.3). node-catalog-service is still a
# placeholder — that sample repo is deferred (solo cut-line §13); build it before wiring the node path.
defaults: &defaults
  test_timeout_seconds: 900
  install_deps: false            # opt-in per repo: build a per-run venv + pip install the repo's
  install_timeout_seconds: 600   # deps (runs the repo's build backend — see _prepare_venv note)
  runner_quota: {cpu: "2", mem: "2Gi"}
  full_suite_override: false
  timezone: "UTC"                # risky_windows are evaluated in this TZ; change per org
  risky_windows:                 # cron-like risky deploy windows (deploy_window_tool)
    - "Fri 16:00-23:59"
    - "Sat"
    - "Sun"
  freeze_dates: []               # e.g. ["2026-12-24", "2026-12-31"]

repos:
  python-payments-service:
    <<: *defaults
    smoke_set:
      - "tests/test_health.py::test_health_ok"
    sensitive_rules:
      - flag: "auth"
        path_globs: ["**/auth/**", "**/security/**"]
        symbol_regexes: ["(?i)(authenticate|login|token|password|jwt)"]
      - flag: "payments"
        path_globs: ["**/payments/**", "**/billing/**"]
        symbol_regexes: ["(?i)(charge|refund|payment|card)"]

  # Real external monorepo (deps not in the Gateway env). Just opt into per-run install —
  # test_runner auto-scans the tree for Python project dirs (no need to list them). Set
  # test_project_dirs only to override auto-detection.
  anandharshit712/ORION:
    <<: *defaults
    install_deps: true
    install_timeout_seconds: 900

  node-catalog-service:
    <<: *defaults
    smoke_set:
      - "test/health.test.js"
    sensitive_rules:
      - flag: "auth"
        path_globs: ["**/auth/**"]
        symbol_regexes: ["(?i)(authenticate|login|token|password|jwt)"]
