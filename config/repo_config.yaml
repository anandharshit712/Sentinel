# Per-repo Sentinel config. Key under `repos:` = DeliveryEvent.repo.name. (04 §5 config files, §5.63)
defaults: &defaults
  test_timeout_seconds: 900
  install_deps: false            # opt-in per repo: build a per-run venv + pip install the repo's
  install_timeout_seconds: 600   # deps (runs the repo's build backend — see _prepare_venv note)
  runner_quota: {cpu: "2", mem: "2Gi"}
  full_suite_override: false
  timezone: "UTC"                # risky_windows are evaluated in this TZ; change per org
  risky_windows:                 # cron-like risky deploy windows (deploy_window_tool)
    - "Fri 16:00-23:59"
    - "Sat"
    - "Sun"
  freeze_dates: []               # e.g. ["2026-12-24", "2026-12-31"]
  # Adaptive security-review fan-out (review_planner / secret_scanner, 04 §5.18).
  review_budget_lines: 800       # per-reviewer LLM snippet budget (hotspot lines / shard)
  max_review_shards: 4           # ceiling on parallel security_reviewer_* agents
  exclude_globs: []              # extra vendored/generated exclusions on top of lib/triage built-ins

repos:
  python-payments-service:
    <<: *defaults
    smoke_set:
      - "tests/test_health.py::test_health_ok"
    sensitive_rules:
      - flag: "auth"
        path_globs: ["**/auth/**", "**/security/**"]
        symbol_regexes: ["(?i)(authenticate|login|token|password|jwt)"]
      - flag: "payments"
        path_globs: ["**/payments/**", "**/billing/**"]
        symbol_regexes: ["(?i)(charge|refund|payment|card)"]

  # Real external monorepo (deps not in the Gateway env). Just opt into per-run install —
  # test_runner auto-scans the tree for Python project dirs (no need to list them). Set
  # test_project_dirs only to override auto-detection.
  anandharshit712/ORION:
    <<: *defaults
    install_deps: true
    install_timeout_seconds: 900

  node-catalog-service:
    <<: *defaults
    install_deps: true  # our own fixture (trusted) — npm install gated the same way as pip -e .
    smoke_set:
      - "test/health.test.js"
    sensitive_rules:
      - flag: "auth"
        path_globs: ["**/auth/**"]
        symbol_regexes: ["(?i)(authenticate|login|token|password|jwt)"]

  # Tiny per-agent budget so a small repo forces a multi-shard fan-out — used by
  # scripts/verify_audit.py to exercise the parallel security-reviewer batch deterministically.
  audit-smoke:
    <<: *defaults
    review_budget_lines: 5

  # Small budget forces a 3-4 shard fan-out on --full so all security_reviewer_* light up.
  anandharshit712/Accident_Detection_System:
    <<: *defaults
    review_budget_lines: 40

  # OWASP/NodeGoat — intentionally-vulnerable Node.js app, real sink density (SQLi/eval/weak
  # crypto/XSS). Budget forced low so --full reliably lands 3-4 shards, not 1.
  OWASP/NodeGoat:
    <<: *defaults
    review_budget_lines: 40

  # OWASP Juice Shop — large intentionally-vulnerable TS/JS app. Tiny budget so --full saturates
  # the 4-shard cap (its sink density is high enough to hit max_review_shards).
  bkimminich/juice-shop:
    <<: *defaults
    review_budget_lines: 40
